name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::955413563895:role/github-codeartifact-reader
          aws-region: ap-south-1

      - name: Login to CodeArtifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain repositree --domain-owner 955413563895 \
            --region ap-south-1 --query authorizationToken --output text)
          echo "CODEARTIFACT_AUTH_TOKEN=${TOKEN}" >> $GITHUB_ENV

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build image (Jib to local daemon)
        if: github.ref == 'refs/heads/main'
        run: |
          ./gradlew jibDockerBuild \
            -Djib.to.image=ghcr.io/repositreeventures/notification-service \
            --no-daemon
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
